# Supabase project configuration — generated by `supabase init`.
# Commit this file to version control alongside your Edge Function source.
# Reference: https://supabase.com/docs/guides/cli/config

project_id = "supabase-udp"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv6"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# ---------------------------------------------------------------------------
# udp-receiver function configuration
#
# verify_jwt = false: Supabase's gateway does NOT validate its own JWT for
# this function. The function itself validates the custom HS256 JWT injected
# by the API Gateway VTL mapping template. This is intentional — we are using
# a rotating short-lived token managed by the Step Functions refresh loop,
# not a Supabase Auth JWT.
# ---------------------------------------------------------------------------
[functions.udp-receiver]
verify_jwt = false

[analytics]
enabled = false
port = 54327
backend = "postgres"
